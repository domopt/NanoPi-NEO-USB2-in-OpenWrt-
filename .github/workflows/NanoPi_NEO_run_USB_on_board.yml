
name: Build OpenWrt for NanoPi NEO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison gawk gcc-multilib \
            gettext git libncurses5-dev libssl-dev python3 \
            rsync unzip zlib1g-dev file wget python3-distutils

      - name: Clone OpenWrt
        run: |
          git clone https://git.openwrt.org/openwrt/openwrt.git openwrt
          cd openwrt
          git checkout v25.12.3
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Patch DTS for USB on NanoPi NEO
        run: |
          cd openwrt
          mkdir -p target/linux/sunxi/patches-6.6

          cat > target/linux/sunxi/patches-6.6/999-nanopi-neo-enable-usb1-usb2.patch << 'EOF'
          --- a/arch/arm/boot/dts/allwinner/sun8i-h3-nanopi-neo.dts
          +++ b/arch/arm/boot/dts/allwinner/sun8i-h3-nanopi-neo.dts
          @@ -105,3 +105,19 @@
           &ohci1 {
           status = "okay";
           };
           +
           +&ehci2 {
           + status = "okay";
           +};
           +
           +&ohci2 {
           + status = "okay";
           +};
           +
           +&ehci3 {
           + status = "okay";
           +};
           +
           +&ohci3 {
           + status = "okay";
           +};
           EOF

      - name: Configure
        run: |
          cd openwrt
          make defconfig
          sed -i '/^CONFIG_TARGET_ROOTFS_PARTSIZE=/d' .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=12228" >> .config
# USB
    scripts/config set CONFIG_PACKAGE_kmod-usb2=y
    scripts/config set CONFIG_PACKAGE_kmod-usb-ohci=y
	  scripts/config set CONFIG_PACKAGE_kmod-usb-ehci-platform=y
	  scripts/config set CONFIG_PACKAGE_usbutils=y
	  scripts/config set CONFIG_PACKAGE_kmod-usb-storage=y
	  scripts/config set CONFIG_PACKAGE_kmod-usb-net=y
	  scripts/config set CONFIG_PACKAGE_kmod-usb-serial=y
	  scripts/config set CONFIG_PACKAGE_kmod-usb-serial-option=y
	  scripts/config set CONFIG_PACKAGE_kmod-usb-serial-wwan=y
	  scripts/config set CONFIG_PACKAGE_usb-modeswitch=y
	  scripts/config set CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
	  scripts/config set CONFIG_PACKAGE_kmod-usb-net-cdc-mbim=y
# Luci and i18n
