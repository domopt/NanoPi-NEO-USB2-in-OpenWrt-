Name: Build OpenWrt for NanoPi NEO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison gawk gcc-multilib \
            gettext git libncurses5-dev libssl-dev python3 \
            rsync unzip zlib1g-dev file wget python3-distutils

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git checkout v25.12.3
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Patch DTS for USB on NanoPi NEO
        run: |
          cd openwrt
          mkdir -p target/linux/sunxi/patches-6.6

          cat > target/linux/sunxi/patches-6.6/999-nanopi-neo-enable-usb1-usb2.patch << 'EOF'
          --- a/arch/arm/boot/dts/allwinner/sun8i-h3-nanopi-neo.dts
          +++ b/arch/arm/boot/dts/allwinner/sun8i-h3-nanopi-neo.dts
          @@ -105,3 +105,19 @@
           &ohci1 {
           status = "okay";
           };
           +
           +&ehci2 {
           + status = "okay";
           +};
           +
           +&ohci2 {
           + status = "okay";
           +};
           +
           +&ehci3 {
           + status = "okay";
           +};
           +
           +&ohci3 {
           + status = "okay";
           +};
          EOF

      - name: Configure
        run: |
          cd openwrt
          
          # КРИТИЧЕСКИ ВАЖНО: Явно задаем целевую архитектуру (Allwinner H3) и профиль NanoPi NEO
          echo "CONFIG_TARGET_sunxi=y" > .config
          echo "CONFIG_TARGET_sunxi_cortexa7=y" >> .config
          echo "CONFIG_TARGET_sunxi_cortexa7_DEVICE_friendlyarm_nanopi-neo=y" >> .config
          
          # Применяем базовую конфигурацию для этого железа
          make defconfig
          
          # Тюнинг размера разделов
          sed -i '/^CONFIG_TARGET_ROOTFS_PARTSIZE=/d' .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=12228" >> .config
          
          # USB Драйверы
          echo "CONFIG_PACKAGE_kmod-usb2=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-ohci=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-ehci-platform=y" >> .config
          echo "CONFIG_PACKAGE_usbutils=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-storage=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-serial=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-serial-option=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-serial-wwan=y" >> .config
          echo "CONFIG_PACKAGE_usb-modeswitch=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-cdc-mbim=y" >> .config
          
          # Интерфейс LuCI и локализация
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-ru=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-fr=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-de=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-bg=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-es=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-tr=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-attendedsysupgrade=y" >> .config
          echo "CONFIG_PACKAGE_luci-compat=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-openvpn=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-wireguard=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-advanced-reboot=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-adblock=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-dockerman=y" >> .config
          
          # Сеть и Фаервол
          echo "CONFIG_PACKAGE_kmod-nft-queue=y" >> .config
          echo "CONFIG_PACKAGE_ipset=y" >> .config
          echo "CONFIG_PACKAGE_git=y" >> .config
          echo "CONFIG_PACKAGE_dtc=y" >> .config
          echo "CONFIG_PACKAGE_grep=y" >> .config
          echo "CONFIG_PACKAGE_wpad=y" >> .config
          echo "CONFIG_PACKAGE_iw=y" >> .config
          echo "CONFIG_PACKAGE_dnsmasq=y" >> .config
          echo "CONFIG_PACKAGE_hostapd=y" >> .config
          echo "CONFIG_PACKAGE_hostapd-utils=y" >> .config
          echo "CONFIG_PACKAGE_wpa-supplicant=y" >> .config
          echo "CONFIG_PACKAGE_iptables-nft=y" >> .config
          echo "CONFIG_PACKAGE_firewall4=y" >> .config
          echo "CONFIG_PACKAGE_nftables=y" >> .config
          echo "CONFIG_PACKAGE_nftables-json=y" >> .config
          echo "CONFIG_PACKAGE_ip-full=y" >> .config
          echo "CONFIG_PACKAGE_tcpdump-mini=y" >> .config
          echo "CONFIG_PACKAGE_wireless-tools=y" >> .config
          echo "CONFIG_PACKAGE_wwan=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ppp=y" >> .config
          echo "CONFIG_PACKAGE_kmod-pppoe=y" >> .config
          
          # Bluetooth
          echo "CONFIG_PACKAGE_bluez-daemon=y" >> .config
          echo "CONFIG_PACKAGE_bluez-libs=y" >> .config
          echo "CONFIG_PACKAGE_bluez-tools=y" >> .config
          echo "CONFIG_PACKAGE_bluez-utils=y" >> .config
          echo "CONFIG_PACKAGE_kmod-bluetooth=y" >> .config
          
          # Драйверы беспроводной сети (WiFi)
          echo "CONFIG_PACKAGE_kmod-cfg80211=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mac80211=y" >> .config
          echo "CONFIG_PACKAGE_kmod-rtl8xxxu=y" >> .config
          echo "CONFIG_PACKAGE_kmod-rtw88=y" >> .config
          echo "CONFIG_PACKAGE_kmod-rtw88-8822c=y" >> .config
          echo "CONFIG_PACKAGE_kmod-rtw88-8822cu=y" >> .config
          echo "CONFIG_PACKAGE_kmod-rtw88-usb=y" >> .config
          echo "CONFIG_PACKAGE_rtl8188fu-firmware=y" >> .config
          echo "CONFIG_PACKAGE_rtl8188eu-firmware=y" >> .config
          echo "CONFIG_PACKAGE_rtl8812au-firmware=y" >> .config
          
          # Драйверы сети
          echo "CONFIG_PACKAGE_kmod-phy-realtek=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-rtl8150=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-rtl8152=y" >> .config
          
          # Инструменты и утилиты
          echo "CONFIG_PACKAGE_apk-mbedtls=y" >> .config
          echo "CONFIG_PACKAGE_bash=y" >> .config
          echo "CONFIG_PACKAGE_bash-completion=y" >> .config
          echo "CONFIG_PACKAGE_cli=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_dmesg=y" >> .config
          echo "CONFIG_PACKAGE_findfs=y" >> .config
          echo "CONFIG_PACKAGE_findutils-find=y" >> .config
          echo "CONFIG_PACKAGE_findutils=y" >> .config
          echo "CONFIG_PACKAGE_fstools=y" >> .config
          echo "CONFIG_PACKAGE_fwtool=y" >> .config
          echo "CONFIG_PACKAGE_gpiod-tools=y" >> .config
          echo "CONFIG_PACKAGE_gpioctl-sysfs=y" >> .config
          echo "CONFIG_PACKAGE_hs20-client=y" >> .config
          echo "CONFIG_PACKAGE_hs20-server=y" >> .config
          echo "CONFIG_PACKAGE_mc=y" >> .config
          echo "CONFIG_PACKAGE_make=y" >> .config
          echo "CONFIG_PACKAGE_nano=y" >> .config
          echo "CONFIG_PACKAGE_sfdisk=y" >> .config
          echo "CONFIG_PACKAGE_ttyd=y" >> .config
          echo "CONFIG_PACKAGE_uboot-envtools=y" >> .config
          echo "CONFIG_PACKAGE_uci=y" >> .config
          echo "CONFIG_PACKAGE_usbids=y" >> .config
          echo "CONFIG_PACKAGE_wget=y" >> .config
          echo "CONFIG_PACKAGE_owut=y" >> .config
          
          # Контейнеризация Docker
          echo "CONFIG_PACKAGE_docker=y" >> .config
          echo "CONFIG_PACKAGE_dockerd=y" >> .config
          echo "CONFIG_PACKAGE_docker-compose=y" >> .config
          echo "CONFIG_PACKAGE_runc=y" >> .config
          echo "CONFIG_PACKAGE_kmod-veth=y" >> .config
          echo "CONFIG_PACKAGE_kmod-br-netfilter=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ipt-nat=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ipt-extra=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nf-nat=y" >> .config
          
          # Сетевой доступ Samba
          echo "CONFIG_PACKAGE_samba4-admin=y" >> .config
          echo "CONFIG_PACKAGE_samba4-client=y" >> .config
          echo "CONFIG_PACKAGE_samba4-libs=y" >> .config
          echo "CONFIG_PACKAGE_samba4-server=y" >> .config
          echo "CONFIG_PACKAGE_samba4-utils=y" >> .config
          
          # VPN WireGuard & Proxy Squid
          echo "CONFIG_PACKAGE_wireguard-tools=y" >> .config
          echo "CONFIG_PACKAGE_lua=y" >> .config
          echo "CONFIG_PACKAGE_squid=y" >> .config
          
          # Финальная фиксация всех зависимостей под NanoPi
          make defconfig

      - name: Build
        run: |
          cd openwrt
          make target/linux/clean
          make download -j"$(nproc)"
          make -j"$(nproc)" || make -j1 V=s

      - name: Проверка собранных файлов
        run: |
          echo "=== Текущая директория ==="
          pwd
          echo "=== Поиск всех образов ==="
          find . -type f -name "*.img*" -o -name "*.bin" -o -name "*.gz" 2>/dev/null || true
          echo "=== Структура папок targets ==="
          ls -R bin/targets/ 2>/dev/null || ls -R openwrt/bin/targets/ 2>/dev/null || echo "Папка targets не найдена!"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-nanopi-neo-firmware
          # Сделали маску более гибкой, чтобы поймать любые форматы образов (.img, .bin, .gz)
          path: openwrt/bin/targets/sunxi/cortexa7/**/*
